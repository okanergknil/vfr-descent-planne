<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VFR Descent Planner | EFB Pro</title>
    <style>
        :root {
            --bg-main: #0f172a;      /* Derin havacılık laciverti */
            --bg-card: #1e293b;      /* Panel arka planı */
            --text-main: #f8fafc;    /* Parlak beyaz metin */
            --text-muted: #94a3b8;   /* Soluk gri */
            --accent-cyan: #06b6d4;  /* Ekrana özgü camgöbeği */
            --accent-green: #22c55e; /* Emniyet yeşili */
            --accent-amber: #f59e0b; /* Uyarı sarısı */
            --accent-red: #ef4444;   /* Tehlike kırmızısı */
        }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .efb-panel {
            background-color: var(--bg-card);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border: 1px solid #334155;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #334155;
            padding-bottom: 15px;
        }
        .header h2 {
            margin: 0;
            color: var(--accent-cyan);
            font-size: 26px;
            letter-spacing: 1.5px;
        }
        .header p {
            margin: 5px 0 0 0;
            color: var(--text-muted);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .input-group { display: flex; flex-direction: column; }
        label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 6px;
            font-weight: 600;
        }
        input {
            background-color: #0f172a;
            border: 1px solid #334155;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }
        input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 8px rgba(6, 182, 212, 0.3);
        }
        button {
            background-color: var(--accent-cyan);
            color: #0f172a;
            border: none;
            padding: 16px;
            border-radius: 8px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:hover { background-color: #0891b2; }
        
        .results-container {
            margin-top: 20px;
            background-color: #0f172a;
            border-radius: 12px;
            border: 1px solid #334155;
            padding: 20px;
            display: none; /* Hesaplama yapılana kadar gizli */
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            align-items: center;
        }
        .data-item { text-align: left; }
        .data-item span {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        .data-item strong {
            font-size: 24px;
            color: var(--text-main);
        }
        .highlight { color: var(--accent-cyan) !important; }
        
        .status-box {
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .status-ok { background-color: rgba(34, 197, 94, 0.1); color: var(--accent-green); border: 1px solid var(--accent-green); }
        .status-warn { background-color: rgba(245, 158, 11, 0.1); color: var(--accent-amber); border: 1px solid var(--accent-amber); }
        .status-danger { background-color: rgba(239, 68, 68, 0.1); color: var(--accent-red); border: 1px solid var(--accent-red); }

        /* Grafik Ekranı */
        canvas {
            width: 100%;
            height: 160px;
            background-color: #000;
            border-radius: 8px;
            border: 1px solid #334155;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="efb-panel">
    <div class="header">
        <h2>DESCENT PLANNER</h2>
        <p>VFR & IFR Flight Profile Calculator</p>
    </div>
    
    <div class="input-grid">
        <div class="input-group">
            <label>Mevcut İrtifa (FT)</label>
            <input type="number" id="currentAlt" placeholder="Örn: 8500">
        </div>
        <div class="input-group">
            <label>Hedef İrtifa (FT)</label>
            <input type="number" id="targetAlt" placeholder="Örn: 1500">
        </div>
        <div class="input-group">
            <label>Yer Hızı - GS (KT)</label>
            <input type="number" id="groundSpeed" placeholder="Örn: 130">
        </div>
        <div class="input-group">
            <label>Kalan Mesafe (NM)</label>
            <input type="number" id="distance" placeholder="Örn: 35">
        </div>
    </div>

    <button onclick="calculateDescent()">PROFİLİ HESAPLA</button>

    <div class="results-container" id="resultBox">
        <div id="statusResult" class="status-box"></div>
        
        <div class="data-row">
            <div class="data-item">
                <span>İdeal TOD Noktası</span>
                <strong id="todResult" class="highlight">--</strong> <strong>NM</strong>
            </div>
            <div class="data-item" style="text-align: right;">
                <span>Gerekli Çöküş (VSI)</span>
                <strong id="vsiResult" class="highlight">--</strong> <strong>FPM</strong>
            </div>
        </div>
        
        <canvas id="flightProfileCanvas"></canvas>
    </div>
</div>

<script>
    // Değişkenleri tanımlayalım
    let currentAlt = 0;
    let groundSpeed = 0;
    let distanceToWp = 0;
    let targetAlt = 1500; // Varsayılan hedef irtifa, bunu kullanıcı arayüzden de değiştirebilir

    // FSUIPC WebSocket Sunucusuna Bağlantı (Varsayılan port 2048'dir)
    const socket = new WebSocket('ws://localhost:2048/fsuipc');

    socket.onopen = function() {
        console.log("✅ FSUIPC WebSocket'e bağlanıldı!");
        document.getElementById('statusResult').innerText = "SİMÜLATÖRE BAĞLI (VERİ BEKLENİYOR...)";
        document.getElementById('statusResult').className = "status-box status-ok";
        document.getElementById('resultBox').style.display = "block";

        // Bağlantı açıldığında FSUIPC'den hangi verileri istediğimizi bildiriyoruz (SimVars)
        const declareVars = {
            "command": "vars.declare",
            "name": "efbData",
            "vars": [
                { "name": "altitude", "simulatorVariable": "INDICATED ALTITUDE", "units": "Feet" },
                { "name": "gs", "simulatorVariable": "GPS GROUND SPEED", "units": "Knots" },
                { "name": "distance", "simulatorVariable": "GPS WP DISTANCE", "units": "Nautical miles" }
            ]
        };
        socket.send(JSON.stringify(declareVars));

        // Verileri saniyede 1 kez (1000ms) bize otomatik göndermesini istiyoruz
        const subscribeVars = {
            "command": "vars.subscribe",
            "name": "efbData",
            "interval": 1000 
        };
        socket.send(JSON.stringify(subscribeVars));
    };

    // FSUIPC'den her saniye yeni veri geldiğinde bu fonksiyon tetiklenir
    socket.onmessage = function(event) {
        const response = JSON.parse(event.data);

        // Eğer gelen mesaj bizim verilerimiz ise:
        if (response.command === "vars.read" && response.name === "efbData") {
            let data = response.data;

            currentAlt = data.altitude;
            groundSpeed = data.gs;
            distanceToWp = data.distance;

            // Hedef irtifayı ekrandaki kutudan al (Pilot bunu hala manuel girecek)
            let targetAltInput = document.getElementById('targetAlt').value;
            if(targetAltInput !== "") {
                targetAlt = parseFloat(targetAltInput);
            }

            // Gelen verileri HTML ekrandaki kutulara da yazalım ki gözle görelim
            document.getElementById('currentAlt').value = currentAlt.toFixed(0);
            document.getElementById('groundSpeed').value = groundSpeed.toFixed(0);
            document.getElementById('distance').value = distanceToWp.toFixed(1);

            // Veriler geldiğine göre hesaplamayı otomatik yap!
            if(groundSpeed > 30) { // Uçak yerdeyken veya çok yavaşken boşuna hesap yapmasın
                calculateDescent();
            }
        }
    };

    socket.onerror = function(error) {
        console.log("Hata:", error);
        document.getElementById('statusResult').innerText = "BAĞLANTI HATASI! FSUIPC WS ÇALIŞIYOR MU?";
        document.getElementById('statusResult').className = "status-box status-danger";
    };

    socket.onclose = function() {
        document.getElementById('statusResult').innerText = "SİMÜLATÖR BAĞLANTISI KOPTU";
        document.getElementById('statusResult').className = "status-box status-warn";
    };

    // Senin yazdığın hesaplama fonksiyonu (Artık DOM'dan değil, direkt değişkenlerden alıyor)
    function calculateDescent() {
        if(currentAlt === 0 || groundSpeed === 0) return;

        let altToLose = currentAlt - targetAlt;
        let tod = (altToLose / 1000) * 3;
        let vsi = groundSpeed * 5;
        let statusElement = document.getElementById('statusResult');
        
        if (altToLose < 0) {
            statusElement.innerText = "TIRMANIŞTASINIZ VEYA HEDEF İRTİFA YÜKSEK";
            statusElement.className = "status-box status-warn";
            return;
        }

        if (distanceToWp > tod) {
            let remain = distanceToWp - tod;
            statusElement.innerText = "SEYRE DEVAM (" + remain.toFixed(1) + " NM SONRA ALÇAL)";
            statusElement.className = "status-box status-ok";
        } else {
            let requiredAltNow = targetAlt + (distanceToWp / 3) * 1000;
            let diff = currentAlt - requiredAltNow;
            
            if (diff > 150) {
                statusElement.innerText = "PROFİLİN " + diff.toFixed(0) + " FT ÜSTÜNDESİN!";
                statusElement.className = "status-box status-danger";
            } else if (diff < -150) {
                statusElement.innerText = "PROFİLİN " + Math.abs(diff).toFixed(0) + " FT ALTINDASIN!";
                statusElement.className = "status-box status-warn";
            } else {
                statusElement.innerText = "PROFİL ÜZERİNDESİN, SÜZÜLÜŞ HARİKA!";
                statusElement.className = "status-box status-ok";
            }
        }

        document.getElementById('todResult').innerText = tod.toFixed(1);
        document.getElementById('vsiResult').innerText = vsi.toFixed(0);
        document.getElementById('resultBox').style.display = "block";

        drawProfile(currentAlt, targetAlt, distanceToWp, tod);
    }

    // Canvas üzerinde görselleştirme (Senin yazdığın kod, aynen duruyor)
    function drawProfile(currentAlt, targetAlt, dist, tod) {
        const canvas = document.getElementById('flightProfileCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = 160;
        const width = canvas.width;
        const height = canvas.height;

        ctx.clearRect(0, 0, width, height);

        const groundY = height - 30;
        ctx.beginPath();
        ctx.moveTo(20, groundY);
        ctx.lineTo(width - 20, groundY);
        ctx.strokeStyle = '#334155';
        ctx.lineWidth = 3;
        ctx.stroke();

        const targetX = width - 40;
        ctx.fillStyle = '#06b6d4';
        ctx.beginPath();
        ctx.arc(targetX, groundY, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#94a3b8';
        ctx.font = '10px sans-serif';
        ctx.fillText('HEDEF', targetX - 15, groundY + 15);

        let todX;
        if (dist >= tod) {
            todX = targetX - (width * 0.6); 
        } else {
            todX = 40; 
        }
        const todY = 40;

        ctx.beginPath();
        ctx.setLineDash([5, 5]);
        ctx.moveTo(todX, todY);
        ctx.lineTo(targetX, groundY);
        ctx.strokeStyle = '#22c55e';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.setLineDash([]); 

        ctx.fillStyle = '#22c55e';
        ctx.beginPath();
        ctx.arc(todX, todY, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.fillText('TOD', todX - 10, todY - 10);

        let planeX, planeY;
        if (dist >= tod) {
            planeY = todY;
            planeX = todX - ((dist - tod) * 5); 
            if(planeX < 20) planeX = 20; 
        } else {
            let progress = 1 - (dist / tod); 
            planeX = todX + (progress * (targetX - todX));
            
            let totalAltDiff = currentAlt - targetAlt; 
            let initialAltDiff = (tod * 1000) / 3; 
            let altRatio = totalAltDiff / initialAltDiff; 
            
            if(altRatio > 1.2) altRatio = 1.2;
            
            planeY = groundY - (altRatio * (groundY - todY));
        }

        ctx.font = '24px sans-serif';
        ctx.fillText('✈️', planeX - 12, planeY + 8);
        
        ctx.fillStyle = '#38bdf8';
        ctx.font = '10px sans-serif';
        ctx.fillText(`${dist.toFixed(1)} NM`, planeX - 10, planeY - 15);
    }
</script>

</body>
</html>
