<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VFR Alçalma Planlayıcısı | Kaptan Semih Batuk</title>
    <style>
        body {
            background-color: #121212;
            color: #00FF00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .cockpit-panel {
            background-color: #1E1E1E;
            border: 2px solid #333;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            max-width: 400px;
            width: 100%;
        }
        h2 {
            text-align: center;
            border-bottom: 1px solid #00FF00;
            padding-bottom: 10px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            background-color: #000;
            color: #00FF00;
            border: 1px solid #00FF00;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #00FF00;
            color: #000;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #00CC00;
        }
        .results {
            margin-top: 20px;
            padding: 15px;
            background-color: #000;
            border: 1px dashed #00FF00;
            border-radius: 4px;
            display: none;
        }
        .warning { color: #FFD700; }
        .danger { color: #FF4500; }
    </style>
</head>
<body>

<div class="cockpit-panel">
    <h2>VFR DESCENT PLANNER</h2>
    
    <div class="input-group">
        <label>Mevcut İrtifa (Feet):</label>
        <input type="number" id="currentAlt" placeholder="Örn: 7500">
    </div>
    <div class="input-group">
        <label>Hedef İrtifa (Feet):</label>
        <input type="number" id="targetAlt" placeholder="Örn: 1500">
    </div>
    <div class="input-group">
        <label>Yer Hızı - GS (Knots):</label>
        <input type="number" id="groundSpeed" placeholder="Örn: 120">
    </div>
    <div class="input-group">
        <label>Hedefe Kalan Mesafe (NM):</label>
        <input type="number" id="distance" placeholder="Örn: 30">
    </div>

    <button onclick="calculateDescent()">HESAPLA</button>

    <div class="results" id="resultBox">
        <p><strong>TOD (Alçalma Noktası):</strong> <span id="todResult"></span> NM kala</p>
        <p><strong>Gerekli Varyo:</strong> <span id="vsiResult"></span> fpm</p>
        <p><strong>Durum:</strong> <span id="statusResult"></span></p>
    </div>
</div>

<script>
    function calculateDescent() {
        let currentAlt = parseFloat(document.getElementById('currentAlt').value);
        let targetAlt = parseFloat(document.getElementById('targetAlt').value);
        let gs = parseFloat(document.getElementById('groundSpeed').value);
        let dist = parseFloat(document.getElementById('distance').value);

        if(isNaN(currentAlt) || isNaN(targetAlt) || isNaN(gs) || isNaN(dist)) {
            alert("Kaptan, lütfen tüm uçuş verilerini eksiksiz girin!");
            return;
        }

        let altToLose = currentAlt - targetAlt;
        let tod = (altToLose / 1000) * 3;
        let vsi = gs * 5;
        let statusText = "";
        let statusElement = document.getElementById('statusResult');
        
        statusElement.className = ""; // Reset class

        if (dist > tod) {
            let remain = dist - tod;
            statusText = "Seyre devam. Alçalmaya " + remain.toFixed(1) + " NM var.";
        } else {
            let requiredAltNow = targetAlt + (dist / 3) * 1000;
            let diff = currentAlt - requiredAltNow;
            
            if (diff > 100) {
                statusText = "Profilin " + diff.toFixed(0) + " ft ÜSTÜNDESİN! Varyoyu artır.";
                statusElement.className = "danger";
            } else if (diff < -100) {
                statusText = "Profilin " + Math.abs(diff).toFixed(0) + " ft ALTINDASIN! Alçalmayı azalt.";
                statusElement.className = "warning";
            } else {
                statusText = "Profil üzerindesin, süzülüş harika!";
            }
        }

        document.getElementById('todResult').innerText = tod.toFixed(1);
        document.getElementById('vsiResult').innerText = vsi.toFixed(0);
        statusElement.innerText = statusText;
        document.getElementById('resultBox').style.display = "block";
    }
</script>

</body>
</html>
